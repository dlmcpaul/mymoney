<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/Standard :: layout(header=~{fragments/Common :: AccountsHeader(${accounts})}, content=~{::main}, menucode='Accounts', scripts=~{::script})}" lang="en">
<body>
<main>
    <div class="ui basic segment">
        <div th:replace="~{fragments/Account :: AccountsBody(${accounts})}"></div>
    </div>
    <div class="ui raised segment">
        <div id="yearlyIncomeExpenseChart" th:attr="data-chart-data=${incomeExpenseHistory}" style="height: 400px;width: 100%"></div>
    </div>
</main>
<script th:inline="javascript" type="text/javascript">
    const moneyFmt = new Intl.NumberFormat(undefined, {
        style: 'currency',
        currency: 'AUD',

        minimumFractionDigits: 2, // This suffices for whole numbers, but will
        // print 2500.10 as $2,500.1
        maximumFractionDigits: 2, // Causes 2500.99 to be printed as $2,501
    });

    let chartDiv = document.getElementById('yearlyIncomeExpenseChart');

    if (chartDiv != null) {
        // Initialize the echarts instance based on the prepared dom
        let yearlyIEChart = echarts.init(chartDiv);

        let yearlyIDData = JSON.parse(chartDiv.dataset.chartData);

        // Specify the configuration items and data for the chart
        let yearlyIEChartOption = {
            title: {
                text: 'Last 10 Years of Income and Expenses (less taxes)'
            },
            tooltip: {
                trigger: 'axis',
                tooltip: {
                    valueFormatter: (value) => moneyFmt.format(value.toFixed(2))
                },
                axisPointer: {
                    type: 'shadow'
                }
            },
            dataset: [
                {
                    source: yearlyIDData
                },
            ],
            legend: {
                data: ['Income', 'Expenses']
            },
            xAxis: [
                {
                    type: 'category',
                    axisTick: {
                        show: false
                    },
                    series: {
                        label: {
                            formatter: '{@[0]}'
                        }
                    }
                }
            ],
            yAxis: [
                {
                    type: 'value',
                }
            ],
            series: [
                {
                    name: 'Income',
                    type: 'bar',
                    label: {
                        show: true,
                        position: 'top',
                        formatter: function (params) {
                            return moneyFmt.format(params.data.income);
                        }
                    },
                    emphasis: {
                        focus: 'series'
                    },
                    series: {
                        encode: {
                            x: 1
                        }
                    }
                },
                {
                    name: 'Expenses',
                    type: 'bar',
                    label: {
                        show: true,
                        position: 'bottom',
                        formatter: function (params) {
                            return moneyFmt.format(params.data.expense);
                        }
                    },
                    emphasis: {
                        focus: 'series'
                    },
                    series: {
                        encode: {
                            x: 2
                        }
                    }
                }
            ]
        };

        // Display the chart using the configuration items and data just specified.
        yearlyIEChart.setOption(yearlyIEChartOption);
    }
</script>
<link rel="stylesheet" data-th-href="@{/css/default.css}"/>
</body>
</html>
